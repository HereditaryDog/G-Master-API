name: Release (Linux, macOS, Windows)

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - '*'
      - '!*-alpha*'

jobs:
  linux:
    name: Linux Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '>=1.25.1'
      - name: Determine version
        run: echo "VERSION=$(git describe --tags)" >> "$GITHUB_ENV"
      - name: Build frontend
        env:
          CI: ""
        run: |
          cd web
          bun install
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
      - name: Build backend (amd64)
        run: |
          go mod download
          go build -ldflags "-s -w -X 'github.com/yangjunyu/G-Master-API/common.Version=$VERSION' -extldflags '-static'" -o g-master-api-$VERSION
      - name: Build backend (arm64)
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y gcc-aarch64-linux-gnu
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X 'github.com/yangjunyu/G-Master-API/common.Version=$VERSION' -extldflags '-static'" -o g-master-api-arm64-$VERSION
      - name: Generate checksums
        run: sha256sum g-master-api-* > checksums-linux.txt
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            g-master-api-*
            checksums-linux.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    name: macOS Release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '>=1.25.1'
      - name: Determine version
        run: echo "VERSION=$(git describe --tags)" >> "$GITHUB_ENV"
      - name: Build frontend
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web
          bun install
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
      - name: Build backend
        run: |
          go mod download
          go build -ldflags "-X 'github.com/yangjunyu/G-Master-API/common.Version=$VERSION'" -o g-master-api-macos-$VERSION
      - name: Generate checksums
        run: shasum -a 256 g-master-api-macos-* > checksums-macos.txt
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            g-master-api-macos-*
            checksums-macos.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows Release
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '>=1.25.1'
      - name: Determine version
        run: echo "VERSION=$(git describe --tags)" >> "$GITHUB_ENV"
      - name: Build frontend
        env:
          CI: ""
        run: |
          cd web
          bun install
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
      - name: Build backend
        run: |
          go mod download
          go build -ldflags "-s -w -X 'github.com/yangjunyu/G-Master-API/common.Version=$VERSION'" -o g-master-api-$VERSION.exe
      - name: Generate checksums
        run: sha256sum g-master-api-*.exe > checksums-windows.txt
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            g-master-api-*.exe
            checksums-windows.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
