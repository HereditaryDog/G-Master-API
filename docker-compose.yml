# G-Master API local Docker Compose stack
#
# Quick start:
#   1. cp .env.example .env
#   2. docker compose up -d --build
#   3. Open http://127.0.0.1:3000
#
# Notes:
#   - Ports are bound to 127.0.0.1 on purpose for local verification.
#   - Change the secrets in .env before exposing this stack outside your machine.

services:
  g-master-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: g-master-api:local
    container_name: g-master-api
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_CONN_STRING: redis://g-master-api-redis:6379/0
      SQL_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@g-master-api-postgres:5432/${POSTGRES_DB}?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET}
      CRYPTO_SECRET: ${CRYPTO_SECRET}
      ERROR_LOG_ENABLED: 'true'
      BATCH_UPDATE_ENABLED: 'true'
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    depends_on:
      g-master-api-redis:
        condition: service_healthy
      g-master-api-postgres:
        condition: service_healthy
    networks:
      - g-master-api-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  g-master-api-redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: g-master-api-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - ./data/redis:/data
    networks:
      - g-master-api-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  g-master-api-postgres:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: g-master-api-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - g-master-api-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  g-master-api-network:
    driver: bridge
